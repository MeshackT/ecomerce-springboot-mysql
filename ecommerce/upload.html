<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background-color: #f4f6f9;
    color: #333;
    transition: all 0.3s ease;
}

.sidebar {
    height: 100vh;
    background: #1e1e2f;
    color: white;
    padding: 20px;
    position: fixed;
    width: 230px;
}

.sidebar h4 {
    font-weight: bold;
}

.sidebar a {
    color: #ccc;
    text-decoration: none;
    display: block;
    margin: 15px 0;
}

.sidebar a:hover {
    color: white;
}

.main-content {
    margin-left: 250px;
    padding: 30px;
}

.card {
    border: none;
    border-radius: 12px;
}

.btn-sm {
    border-radius: 20px;
}


</style>
</head>
<body>

    <div id="preloader">
        <div class="jumper">
            <div></div>
            <div></div>
            <div></div>
        </div>
    </div> 



<div class="sidebar">
    <h4>CloudVendor</h4>
    <hr>
    <a href="#">📦 Products</a>
    <a href="#">🛒 View Orders</a>
    <a href="#">💰 Transaction History</a>
    <a href="index.html">📊 Live Web</a>
    <a href="#">📁 Reports</a>

    <a href="#" onclick="logout()">🚪 Logout</a>
</div>

<div class="main-content">
    <h2 class="mb-4">Product Management</h2>

    <!-- Add Product Card -->
<div class="card shadow-sm p-4 mb-4">
    <h5>Add New Product</h5>
    <div class="row g-2">

        <div class="col-md-2">
            <input type="file" id="imageUrl" class="form-control" accept="image/*" onchange="previewImage()">
            <br>
            <img id="imagePreview" src="" style="display:none;width:120px;height:120px;object-fit:cover;border-radius:8px;border:1px solid #ccc;">
        </div>

        <div class="col-md-2"><input type="text" id="name" class="form-control" placeholder="Name"></div>
        <div class="col-md-2"><input type="text" id="description" class="form-control" placeholder="Description"></div>
        <div class="col-md-2"><input type="number" id="price" class="form-control" placeholder="Price"></div>
        <div class="col-md-2"><input type="number" id="quantity" class="form-control" placeholder="Qty"></div>
        <div class="col-md-2"><input type="text" id="sku" class="form-control" placeholder="SKU"></div>
        <div class="col-md-2"><input type="text" id="category" class="form-control" placeholder="Category"></div>
        <div class="col-md-2"><input type="text" id="brand" class="form-control" placeholder="Brand"></div>
        <div class="col-md-2"><input type="number" id="discountPrice" class="form-control" placeholder="Discount Price"></div>
        <div class="col-md-2">
            <select id="onSale" class="form-select">
                <option value="false" selected>No Sale</option>
                <option value="true">On Sale</option>
            </select>
        </div>
          <div class="col-md-2"><input type="text" id="tags" class="form-control" placeholder="Tags (comma separated)"></div>

        <div class="col-md-2">
            <button class="btn btn-dark w-100 btn-add">Add</button>
        </div>
    </div>
</div>

    <input
        type="text"
        id="searchProduct"
        class="form-control mb-3"
        placeholder="Search product..."
        onkeyup="searchProducts()"
        
        >
    <!-- Products Table -->
    <div class="card shadow-sm p-4">
        <h5>All Products</h5>
        <table class="table table-striped mt-3" id="productTable" style="min-width: 900px;" >
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Qty</th>
                    <th>Url</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="products">
                <!-- Products will load here -->
            </tbody>
        </table>
    </div>

    <!-- Edit Product Modal -->
    <div class="modal fade" id="editProductModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content p-3">
            <div class="modal-header">
                <h5 class="modal-title">Edit Product</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="editProductForm">
                <input type="hidden" id="edit-id" />
                <div class="mb-2">
                    <label>Name</label>
                    <input type="text" id="edit-name" class="form-control">
                </div>
                <div class="mb-2">
                    <label>Description</label>
                    <textarea id="edit-desc" class="form-control"></textarea>
                </div>
                <div class="mb-2 row">
                    <div class="col">
                    <label>Price</label>
                    <input type="number" id="edit-price" class="form-control">
                    </div>
                    <div class="col">
                    <label>Qty</label>
                    <input type="number" id="edit-qty" class="form-control">
                    </div>
                </div>
                <div class="mb-2 row">
                    <div class="col">
                    <label>SKU</label>
                    <input type="text" id="edit-sku" class="form-control">
                    </div>
                    <div class="col">
                    <label>Category</label>
                    <input type="text" id="edit-category" class="form-control">
                    </div>
                    <div class="col">
                    <label>Brand</label>
                    <input type="text" id="edit-brand" class="form-control">
                    </div>
                </div>
                <div class="mb-2 row">
                    <div class="col">
                    <label>Discount</label>
                    <input type="number" id="edit-discountPrice" class="form-control">
                    </div>
                    <div class="col">
                    <label>On Sale</label>
                    <select id="edit-onSale" class="form-select">
                        <option value="true">Yes</option>
                        <option value="false">No</option>
                    </select>
                    </div>
                    <div class="col">
                    <label>Tags</label>
                    <input type="text" id="edit-tags" class="form-control">
                    </div>
                </div>
                
                <div class="mb-2">
                    <input type="file" id="edit-imageUrl" class="form-control" accept="image/*" onchange="previewEditImage()" >
                    <br>
                    <img id="edit-imagePreview" src="" style="display:none;width:120px;height:120px;object-fit:cover;border-radius:8px;border:1px solid #ccc;">
                </div>
                
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" onclick="saveProduct()">Save</button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            </div>
            </div>
        </div>
    </div>
</div>

<script>
function logout() {
    localStorage.removeItem("adminId");
    localStorage.removeItem("username");
    window.location.href = "login.html";
}
</script>

    <!-- Plugins -->
    <script src="assets/js/owl-carousel.js"></script>
    <script src="assets/js/accordions.js"></script>
    <script src="assets/js/datepicker.js"></script>
    <script src="assets/js/scrollreveal.min.js"></script>
    <script src="assets/js/waypoints.min.js"></script>
    <script src="assets/js/jquery.counterup.min.js"></script>
    <script src="assets/js/imgfix.min.js"></script> 
    <script src="assets/js/slick.js"></script> 
    <script src="assets/js/lightbox.js"></script> 
    <script src="assets/js/isotope.js"></script> 
    
    <!-- Global Init -->
    <script src="assets/js/custom.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/store.js"></script>

</body>
</html>
